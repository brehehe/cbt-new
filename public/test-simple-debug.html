<!DOCTYPE html>
<html lang="id">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple Test - Countdown & Camera</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
            }

            .status {
                margin: 10px 0;
                padding: 10px;
                border-radius: 5px;
            }

            .success {
                background-color: #d4edda;
                color: #155724;
            }

            .error {
                background-color: #f8d7da;
                color: #721c24;
            }

            .warning {
                background-color: #fff3cd;
                color: #856404;
            }

            #countdown {
                font-size: 2em;
                font-weight: bold;
                margin: 20px 0;
            }

            video {
                max-width: 400px;
                border: 2px solid #ccc;
                border-radius: 8px;
            }

        </style>
    </head>

    <body>
        <h1>🧪 Simple Test - Countdown & Camera</h1>

        <div class="status warning">
            <strong>Test Mode:</strong> Ini halaman debug sederhana untuk test countdown dan camera
        </div>

        <h2>⏰ Countdown Test</h2>
        <div id="countdown">00:00:00</div>
        <button onclick="startSimpleCountdown()">Start 60 Second Test</button>
        <div id="countdownStatus" class="status"></div>

        <h2>📹 Camera Test</h2>
        <video id="cameraPreview" autoplay muted></video>
        <br><br>
        <button onclick="startSimpleCamera()">Test Camera Access</button>
        <div id="cameraStatus" class="status"></div>

        <h2>🎬 Recording Test</h2>
        <button onclick="testRecording()">Test Recording Function</button>
        <div id="recordingStatus" class="status"></div>

        <script>
            console.log('🧪 Simple test page loaded');

            // Test 1: Simple countdown
            function startSimpleCountdown() {
                console.log('🕐 Starting simple countdown test');
                document.getElementById('countdownStatus').innerHTML = '<strong>Status:</strong> Starting countdown...';
                document.getElementById('countdownStatus').className = 'status warning';

                const countdownElement = document.getElementById("countdown");
                if (!countdownElement) {
                    console.error('❌ Countdown element missing');
                    return;
                }

                let remainingTime = 60; // 60 seconds test

                const interval = setInterval(() => {
                    if (remainingTime <= 0) {
                        countdownElement.innerHTML = "✅ TEST COMPLETED";
                        clearInterval(interval);
                        document.getElementById('countdownStatus').innerHTML = '<strong>✅ Success:</strong> Countdown completed successfully!';
                        document.getElementById('countdownStatus').className = 'status success';
                        console.log('✅ Countdown test completed');
                        return;
                    }

                    const minutes = Math.floor(remainingTime / 60);
                    const seconds = remainingTime % 60;
                    const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    countdownElement.innerHTML = timeString;

                    console.log('⏱️ Time remaining:', timeString);
                    remainingTime--;
                }, 1000);

                console.log('✅ Countdown started');
            }

            // Test 2: Simple camera
            async function startSimpleCamera() {
                console.log('📹 Starting simple camera test');
                document.getElementById('cameraStatus').innerHTML = '<strong>Status:</strong> Requesting camera access...';
                document.getElementById('cameraStatus').className = 'status warning';

                try {
                    // Check basic requirements
                    console.log('🔍 Checking requirements...');
                    console.log('- Protocol:', window.location.protocol);
                    console.log('- Host:', window.location.host);
                    console.log('- getUserMedia available:', !!navigator.mediaDevices?.getUserMedia);
                    console.log('- MediaRecorder available:', !!window.MediaRecorder);

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('getUserMedia not supported');
                    }

                    console.log('🎥 Requesting camera stream...');
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: 640,
                            height: 480,
                            facingMode: 'user'
                        },
                        audio: false
                    });

                    console.log('✅ Camera stream obtained');

                    const cameraPreview = document.getElementById('cameraPreview');
                    if (cameraPreview) {
                        cameraPreview.srcObject = stream;
                        console.log('✅ Camera preview set');

                        document.getElementById('cameraStatus').innerHTML = '<strong>✅ Success:</strong> Camera working! Stream active.';
                        document.getElementById('cameraStatus').className = 'status success';
                    } else {
                        throw new Error('Camera preview element not found');
                    }

                } catch (error) {
                    console.error('❌ Camera test failed:', error);

                    let errorMsg = 'Camera access failed: ' + error.message;
                    let suggestions = [];

                    if (error.name === 'NotAllowedError') {
                        suggestions.push('Click camera icon in address bar and allow access');
                        suggestions.push('Refresh page after giving permission');
                    } else if (error.name === 'NotFoundError') {
                        suggestions.push('Make sure camera is connected');
                        suggestions.push('Close other apps using camera');
                    } else if (error.message.includes('getUserMedia')) {
                        suggestions.push('Use Chrome, Firefox, or Edge browser');
                        suggestions.push('Update browser to latest version');
                    }

                    const suggestionText = suggestions.length > 0 ? '<br><strong>Solutions:</strong><br>• ' + suggestions.join('<br>• ') : '';

                    document.getElementById('cameraStatus').innerHTML = `<strong>❌ Error:</strong> ${errorMsg}${suggestionText}`;
                    document.getElementById('cameraStatus').className = 'status error';
                }
            }

            // Test 3: Recording capability
            async function testRecording() {
                console.log('🎬 Testing recording capability');
                document.getElementById('recordingStatus').innerHTML = '<strong>Status:</strong> Testing recording...';
                document.getElementById('recordingStatus').className = 'status warning';

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: false
                    });

                    if (!window.MediaRecorder) {
                        throw new Error('MediaRecorder not supported');
                    }

                    // Test codec support
                    const codecs = [
                        'video/webm;codecs=vp9',
                        'video/webm;codecs=vp8',
                        'video/webm',
                        'video/mp4'
                    ];

                    let supportedCodec = null;
                    for (const codec of codecs) {
                        if (MediaRecorder.isTypeSupported(codec)) {
                            supportedCodec = codec;
                            break;
                        }
                    }

                    if (!supportedCodec) {
                        throw new Error('No supported video codec found');
                    }

                    console.log('✅ Supported codec:', supportedCodec);

                    // Test recording
                    const mediaRecorder = new MediaRecorder(stream, {
                        mimeType: supportedCodec
                    });

                    let recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                            console.log('📦 Recorded chunk:', event.data.size, 'bytes');
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: supportedCodec });
                        const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
                        console.log('✅ Recording completed:', sizeMB, 'MB');

                        document.getElementById('recordingStatus').innerHTML = `<strong>✅ Success:</strong> Recording works! Created ${sizeMB}MB test video with ${supportedCodec}`;
                        document.getElementById('recordingStatus').className = 'status success';

                        // Stop stream
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    console.log('🎬 Recording started...');

                    // Record for 3 seconds then stop
                    setTimeout(() => {
                        mediaRecorder.stop();
                        console.log('🛑 Recording stopped');
                    }, 3000);

                } catch (error) {
                    console.error('❌ Recording test failed:', error);
                    document.getElementById('recordingStatus').innerHTML = `<strong>❌ Error:</strong> Recording failed: ${error.message}`;
                    document.getElementById('recordingStatus').className = 'status error';
                }
            }

            // Auto-run basic checks on load
            document.addEventListener('DOMContentLoaded', function () {
                console.log('✅ Simple test page ready');

                // Auto-check elements
                const countdown = document.getElementById('countdown');
                const camera = document.getElementById('cameraPreview');

                console.log('🔍 Element check:');
                console.log('- Countdown element:', countdown ? '✅ Found' : '❌ Missing');
                console.log('- Camera element:', camera ? '✅ Found' : '❌ Missing');

                // Show browser info
                console.log('🌐 Browser info:');
                console.log('- User agent:', navigator.userAgent);
                console.log('- Protocol:', window.location.protocol);
                console.log('- getUserMedia:', !!navigator.mediaDevices?.getUserMedia);
                console.log('- MediaRecorder:', !!window.MediaRecorder);
            });
        </script>
    </body>

</html>
