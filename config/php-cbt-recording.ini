# =====================================================
# PHP Configuration for CBT Video Recording (1GB Support)
# =====================================================
# File: php-cbt-recording.ini
# Purpose: Optimized PHP settings for large video upload and processing

# =====================================================
# UPLOAD & POST SETTINGS
# =====================================================

# Maximum file upload size (1.2GB to handle 1GB files with overhead)
upload_max_filesize = 1200M

# Maximum POST data size (should be larger than upload_max_filesize)
post_max_size = 1300M

# Maximum number of files that can be uploaded via a single request
max_file_uploads = 20

# =====================================================
# MEMORY & EXECUTION SETTINGS
# =====================================================

# Memory limit (2GB for video processing)
memory_limit = 2048M

# Maximum execution time (30 minutes for large uploads)
max_execution_time = 1800

# Maximum time for input parsing (20 minutes)
max_input_time = 1200

# Maximum input variables (for complex forms)
max_input_vars = 5000

# =====================================================
# SESSION SETTINGS
# =====================================================

# Session timeout (2 hours for long exam sessions)
session.gc_maxlifetime = 7200

# Session cookie lifetime (2 hours)
session.cookie_lifetime = 7200

# =====================================================
# OUTPUT BUFFERING
# =====================================================

# Output buffering for better performance
output_buffering = 4096

# Implicit flush disabled for better control
implicit_flush = Off

# =====================================================
# ERROR REPORTING & LOGGING
# =====================================================

# Enable error logging
log_errors = On

# Log file for PHP errors
error_log = /var/log/php/cbt-recording-errors.log

# Don't display errors to users (security)
display_errors = Off

# Report all errors except notices
error_reporting = E_ALL & ~E_NOTICE & ~E_STRICT & ~E_DEPRECATED

# =====================================================
# OPCACHE SETTINGS (for better performance)
# =====================================================

# Enable OPcache
opcache.enable = 1

# Memory size for OPcache (256MB)
opcache.memory_consumption = 256

# Maximum number of files in cache
opcache.max_accelerated_files = 20000

# Validate timestamps (disabled in production)
opcache.validate_timestamps = 0

# Revalidate frequency
opcache.revalidate_freq = 0

# =====================================================
# REALPATH CACHE (for better file access performance)
# =====================================================

# Realpath cache size
realpath_cache_size = 4096K

# Realpath cache TTL
realpath_cache_ttl = 600

# =====================================================
# TEMPORARY DIRECTORY SETTINGS
# =====================================================

# Temporary upload directory
upload_tmp_dir = /var/www/html/drshieldapp/procbt.id/storage/tmp

# System temp directory
sys_temp_dir = /var/www/html/drshieldapp/procbt.id/storage/tmp

# =====================================================
# SECURITY SETTINGS
# =====================================================

# Expose PHP version (disabled for security)
expose_php = Off

# Allow URL includes (disabled for security)
allow_url_include = Off

# Allow URL fopen (enabled for external API calls)
allow_url_fopen = On

# =====================================================
# DATE & TIMEZONE
# =====================================================

# Default timezone
date.timezone = "Asia/Jakarta"

# =====================================================
# ADDITIONAL OPTIMIZATIONS FOR VIDEO PROCESSING
# =====================================================

# Enable gzip compression
zlib.output_compression = On

# Gzip compression level (6 is optimal balance)
zlib.output_compression_level = 6

# User agent detection for IE compatibility
auto_detect_line_endings = On

# Precision for float calculations
precision = 14

# Default socket timeout
default_socket_timeout = 600

# =====================================================
# END OF CONFIGURATION
# =====================================================
