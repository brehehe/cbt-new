# =====================================================
# Nginx Configuration for CBT Video Recording (1GB Support)
# =====================================================
# File: nginx-cbt-recording.conf
# Purpose: Optimized Nginx settings for large video upload and streaming

# =====================================================
# HTTP BLOCK CONFIGURATIONS
# =====================================================

# Add these to your http block in nginx.conf:

# Maximum client body size (1.5GB to handle 1GB files with overhead)
client_max_body_size 1500M;

# Client timeouts for large uploads
client_body_timeout 300s;        # 5 minutes for body upload
client_header_timeout 60s;       # 1 minute for headers
client_body_buffer_size 128k;    # Buffer size for request body

# Send timeout
send_timeout 300s;               # 5 minutes for response send

# Keepalive settings
keepalive_timeout 300s;          # 5 minutes keepalive
keepalive_requests 1000;         # Max requests per connection

# =====================================================
# PROXY SETTINGS (for PHP-FPM)
# =====================================================

# Proxy timeouts
proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

# Proxy buffer settings for large responses
proxy_buffers 8 16k;
proxy_buffer_size 32k;
proxy_busy_buffers_size 64k;
proxy_temp_file_write_size 64k;

# =====================================================
# FASTCGI SETTINGS (for PHP-FPM)
# =====================================================

# FastCGI timeouts
fastcgi_connect_timeout 60s;
fastcgi_send_timeout 300s;
fastcgi_read_timeout 300s;

# FastCGI buffer settings
fastcgi_buffers 8 16k;
fastcgi_buffer_size 32k;
fastcgi_busy_buffers_size 64k;
fastcgi_temp_file_write_size 64k;

# =====================================================
# GZIP COMPRESSION
# =====================================================

# Enable gzip compression
gzip on;
gzip_vary on;
gzip_min_length 10240;
gzip_proxied expired no-cache no-store private must-revalidate auth;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# =====================================================
# TEMPORARY FILES CONFIGURATION
# =====================================================

# Temporary path for client body (adjust path as needed)
client_body_temp_path /var/cache/nginx/client_temp;
proxy_temp_path /var/cache/nginx/proxy_temp;
fastcgi_temp_path /var/cache/nginx/fastcgi_temp;

# =====================================================
# RATE LIMITING (to prevent abuse)
# =====================================================

# Define rate limit zones
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

# =====================================================
# SAMPLE SERVER BLOCK FOR CBT APPLICATION
# =====================================================

server {
    listen 80;
    listen [::]:80;
    server_name cbt-new.drshieldapp.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cbt-new.drshieldapp.com;

    root /var/www/html/drshieldapp/cbt-new.drshieldapp.com/public;
    index index.php index.html;

    # =====================================================
    # SSL CONFIGURATION
    # =====================================================

    # SSL certificate paths (adjust as needed)
    ssl_certificate /etc/ssl/certs/drshieldapp.com.crt;
    ssl_certificate_key /etc/ssl/private/drshieldapp.com.key;

    # SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =====================================================
    # UPLOAD SPECIFIC ROUTES
    # =====================================================

    # Video upload endpoints with rate limiting
    location ~* ^/(api/upload|api/video|livewire/upload) {
        # Apply upload rate limit
        limit_req zone=upload burst=5 nodelay;

        # Large upload settings
        client_max_body_size 1500M;
        client_body_timeout 600s;

        # Pass to PHP
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API endpoints with moderate rate limiting
    location ~* ^/api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =====================================================
    # STATIC FILES OPTIMIZATION
    # =====================================================

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Video files streaming
    location ~* \.(mp4|webm|mov|avi|mkv)$ {
        expires 1d;
        add_header Cache-Control "public";

        # Enable range requests for video streaming
        add_header Accept-Ranges bytes;

        # Security headers for video files
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    # =====================================================
    # PHP-FPM CONFIGURATION
    # =====================================================

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Large upload timeouts
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;

        # Buffer settings for large responses
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }

    # =====================================================
    # SECURITY & ACCESS CONTROL
    # =====================================================

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(storage|bootstrap|config|database|tests)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel public directory
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =====================================================
    # LOGGING
    # =====================================================

    access_log /var/log/nginx/cbt-access.log;
    error_log /var/log/nginx/cbt-error.log warn;
}

# =====================================================
# END OF CONFIGURATION
# =====================================================
